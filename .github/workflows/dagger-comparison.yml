name: dagger-comparison

# Runs the Dagger mirror of .harmont/ci.py (the comparison/ module) end-to-end
# and fails if any leaf fails. This is the Dagger-side counterpart to the
# `dogfood (hm run ci)` job — same work, different engine — so the ergonomics
# comparison stays honest and the mirror can't silently rot.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# The full workspace compile is expensive; cancel superseded runs.
concurrency:
  group: dagger-comparison-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dagger-ci:
    name: dagger comparison ci
    runs-on: ubuntu-latest
    # Cold runs compile the whole Rust workspace inside the Dagger engine
    # (no cross-run cache), plus uv sync + pytest. Match the dogfood budget.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Pin to the engineVersion in comparison/dagger.json so the CLI and the
      # auto-provisioned engine match.
      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | BIN_DIR="$HOME/.local/bin" DAGGER_VERSION=0.20.3 sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: dagger version
        run: dagger version

      # Equivalent to `hm run ci`. DefaultPath("..") resolves the repo root from
      # the module dir; Ignore excludes target/.git/node_modules so the upload
      # stays small and the in-container build writes stub TS bundles (matching
      # harmont's node-less container).
      - name: Run comparison pipeline (dagger -m comparison call ci)
        run: dagger -m comparison call ci
