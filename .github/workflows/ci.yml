name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  unit:
    name: cargo test --lib + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install esbuild (for harmont-ts bundle)
        working-directory: dsls/harmont-ts
        run: npm ci

      - name: cargo build (all targets)
        run: cargo build -p harmont-cli --all-targets

      - name: cargo test --lib
        run: cargo test -p harmont-cli --lib

      - name: cargo clippy (strict)
        run: cargo clippy --all-targets -p harmont-cli -- -D warnings

  python-lint:
    name: harmont-py (pytest + ruff + ty)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install harmont + dev extras
        working-directory: dsls/harmont-py
        run: pip install -e '.[dev]'

      - name: ruff check
        working-directory: dsls/harmont-py
        run: ruff check .

      - name: ty
        working-directory: dsls/harmont-py
        run: ty check harmont

      - name: pytest
        working-directory: dsls/harmont-py
        run: |
          pytest -v \
            --deselect tests/test_gradle.py \
            --deselect tests/test_haskell.py

  ts-dsl:
    name: harmont-ts (vitest + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dsls/harmont-ts/package-lock.json

      - name: Install
        working-directory: dsls/harmont-ts
        run: npm ci

      - name: Type check
        working-directory: dsls/harmont-ts
        run: npx tsc --noEmit

      - name: Test
        working-directory: dsls/harmont-ts
        run: npm test

  dogfood:
    name: dogfood (hm run ci)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm
          cache-dependency-path: dsls/harmont-ts/package-lock.json

      - name: Install esbuild (for harmont-ts bundle)
        working-directory: dsls/harmont-ts
        run: npm ci

      - name: Build hm
        run: cargo build -p harmont-cli

      - name: Enable FUSE allow_other
        run: sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf

      - name: Restore harmont Docker cache
        uses: actions/cache/restore@v4
        with:
          path: .harmont-cache/
          key: harmont-v1-will-never-match
          restore-keys: |
            harmont-v1-

      - name: Load cached Docker images
        run: ./target/debug/hm cache restore .harmont-cache/

      - name: hm run ci
        env:
          HM_NONINTERACTIVE: '1'
        run: ./target/debug/hm run ci

      - name: Save harmont Docker images
        id: cache-manifest
        if: always()
        run: |
          hash=$(./target/debug/hm cache save .harmont-cache/)
          echo "key=harmont-v1-${hash}" >> "$GITHUB_OUTPUT"

      - name: Upload Docker cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .harmont-cache/
          key: ${{ steps.cache-manifest.outputs.key }}
