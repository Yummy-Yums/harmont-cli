name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  unit:
    name: cargo test --lib + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install esbuild (for harmont-ts bundle)
        working-directory: crates/hm-dsl-engine/harmont-ts
        run: npm ci

      - name: cargo build (all targets)
        run: cargo build -p harmont-cli --all-targets

      - name: cargo test --lib
        run: cargo test -p harmont-cli --lib

      - name: cargo clippy (strict)
        run: cargo clippy --all-targets -p harmont-cli -- -D warnings

  python-lint:
    name: harmont-py (pytest + ruff + ty)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install harmont + dev extras
        working-directory: crates/hm-dsl-engine/harmont-py
        run: pip install -e '.[dev]'

      - name: ruff check
        working-directory: crates/hm-dsl-engine/harmont-py
        run: ruff check .

      - name: ty
        working-directory: crates/hm-dsl-engine/harmont-py
        run: ty check harmont

      - name: pytest
        working-directory: crates/hm-dsl-engine/harmont-py
        run: |
          pytest -v \
            --deselect tests/test_gradle.py \
            --deselect tests/test_haskell.py

  ts-dsl:
    name: harmont-ts (vitest + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crates/hm-dsl-engine/harmont-ts/package-lock.json

      - name: Install
        working-directory: crates/hm-dsl-engine/harmont-ts
        run: npm ci

      - name: Type check
        working-directory: crates/hm-dsl-engine/harmont-ts
        run: npx tsc --noEmit

      - name: Test
        working-directory: crates/hm-dsl-engine/harmont-ts
        run: npm test

  dogfood:
    name: dogfood (hm run ci)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm
          cache-dependency-path: crates/hm-dsl-engine/harmont-ts/package-lock.json

      - name: Install esbuild (for harmont-ts bundle)
        working-directory: crates/hm-dsl-engine/harmont-ts
        run: npm ci

      - name: Build hm
        run: cargo build -p harmont-cli

      - name: Enable FUSE allow_other
        run: sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf

      - name: Run harmont pipeline
        uses: harmont-dev/actions-hm@main
        with:
          pipeline: ci
          hm-path: ./target/debug/hm
          cache: 'false'
